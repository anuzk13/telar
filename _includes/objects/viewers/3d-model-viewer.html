<div id="object-viewer" class="viewer-model"
    role="img"
    aria-label="{{ page.alt_text | escape }}"
    data-alt-text="{{ page.alt_text | escape }}"
    data-base-url = "{{ site.baseurl }}"
    data-model-id="{{ page.object_id }}">

  <div id="modelNav"
    class="model-nav"
    role="group"
    aria-label="{{ lang.object.model_nav.label }}">
    <button
      data-act="zoom-in"
      aria-label="{{ lang.object.model_nav.zoom_in }}"
      title="{{ lang.object.model_nav.zoom_in }}">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    </button>
    <button
      data-act="zoom-out"
      aria-label="{{ lang.object.model_nav.zoom_out }}"
      title="{{ lang.object.model_nav.zoom_out }}">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    </button>
    <div class="model-nav-sep"></div>
    <div class="model-nav-pad">
      <span></span>
      <button
        data-act="pan-up"
        aria-label="{{ lang.object.model_nav.pan_up }}"
        title="{{ lang.object.model_nav.pan_up }}">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 14 12 8 18 14"/></svg>
        </button>
      <span></span>
      <button
        data-act="pan-left"
        aria-label="{{ lang.object.model_nav.pan_left }}"
        title="{{ lang.object.model_nav.pan_left }}">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="14 6 8 12 14 18"/></svg>
        </button>
      <span class="model-nav-dot"></span>
      <button
        data-act="pan-right"
        aria-label="{{ lang.object.model_nav.pan_right }}"
        title="{{ lang.object.model_nav.pan_right }}">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="10 6 16 12 10 18"/></svg>
      </button>
      <span></span>
      <button
        data-act="pan-down"
        aria-label="{{ lang.object.model_nav.pan_down }}"
        title="{{ lang.object.model_nav.pan_down }}">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 10 12 16 18 10"/></svg>
      </button>
      <span></span>
    </div>
    <div class="model-nav-sep"></div>
    <button
      data-act="reset"
      aria-label="{{ lang.object.model_nav.reset_view }}"
      title="{{ lang.object.model_nav.reset_view }}">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 9 8 9"/></svg>
    </button>
  </div>
</div>

<!-- 3D camera-position picker: read the live model-viewer camera and copy the
six numeric framing columns (azimuth, elevation, distance, target_x/y/z)
for the story spreadsheet. Fourth instance of the collapsible picker pattern. -->
<div class="mt-3">
  <div id="cameraPickerButton">
    <button
      class="btn btn-developer btn-sm"
      data-bs-toggle="collapse"
      data-bs-target="#cameraPanel"
      aria-expanded="false">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        {{ lang.object.camera_picker.button }}
    </button>
  </div>

  <div
    class="collapse"
    id="cameraPanel"
    data-model-copy-text = "{{ lang.object.camera_picker.copied }}">
    <div class="card camera-panel coordinate-panel">
      <div class="card-body camera-panel-body coordinate-panel-body">
        <button type="button" class="btn-close coordinate-panel-close" data-bs-toggle="collapse" data-bs-target="#cameraPanel"></button>

        <div class="row coordinate-panel-row">
          <div class="col-md-6">
            <div class="coordinate-panel-instructions">
              <h6 class="coordinate-panel-heading"> {{ lang.object.camera_picker.heading }} </h6>
              <p class="mb-0">{{ lang.object.camera_picker.instructions }}</p>
            </div>
          </div>

          <div class="col-md-6">
            <div class="coordinate-panel-values">
              <div class="coordinate-panel-values-inner">
                <dl class="row mb-0">
                  <dt class="col-sm-4 coord-label">{{ lang.object.camera_picker.camera_label }}<br><small class="coord-hint">{{ lang.object.camera_picker.camera_hint }}</small></dt>
                  <dd class="col-sm-8 coord-field">
                    <code id="cam-camera">0  75  1</code>
                    <button
                      class="btn btn-sm coord-copy-btn"
                      data-act="copy-cam-camera"
                      title="{{ lang.object.camera_picker.copy_camera_tooltip }}">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
                    </button>
                  </dd>

                  <dt class="col-sm-4 coord-label">{{ lang.object.camera_picker.target_label }}<br><small class="coord-hint">{{ lang.object.camera_picker.target_hint }}</small></dt>
                  <dd class="col-sm-8 coord-field">
                    <code id="cam-target">0  0  0</code>
                    <button
                      class="btn btn-sm coord-copy-btn"
                      data-act="copy-cam-target"
                      title="{{ lang.object.camera_picker.copy_target_tooltip | default: 'Copy target_x, target_y, target_z' }}">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
                    </button>
                  </dd>

                  <dt class="col-sm-4"></dt>
                  <dd class="col-sm-8 mb-2">
                    <button
                      class="btn btn-sm btn-copy w-100"
                      data-act="copy-cam-sheets">
                      <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg> {{ lang.object.camera_picker.copy_sheets }}
                    </button>
                  </dd>

                  <dt class="col-sm-4"></dt>
                  <dd class="col-sm-8 mb-0">
                    <button
                      class="btn btn-sm btn-copy w-100"
                      data-act="copy-cam-csv">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg> {{ lang.object.camera_picker.copy_csv }}
                    </button>
                  </dd>
                </dl>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="{{ '/assets/vendor/model-viewer/model-viewer-umd.min.js' | relative_url }}"></script>
<script src="{{ '/assets/js/objects/3d-model-viewer.js' | relative_url }}"></script>
